name: Bug Report
description: File a bug report.
title: "[Bug]: "
labels: ["bug", "triage"]
assignees: []

body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to fill out this bug report as completely as possible!

  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: Describe the bug as clearly and completely as possible.
      placeholder: What happened?
    validations:
      required: true

  - type: textarea
    id: reproduction
    attributes:
      label: Steps to Reproduce
      placeholder: |
        1. Go to ...
        2. Run ...
        3. Observe ...
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
      description: Describe the behavior you expected.
      placeholder: What should have happened?
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Relevant log output
      description: Please copy and paste any relevant log output. This will be automatically formatted into code, so no need for backticks.
      render: shell
      placeholder: |
        Traceback (most recent call last):
        ...
    validations:
      required: false

  - type: input
    id: environment
    attributes:
      label: Environment
      description: Python version, operating system, and bot version (if known).
      placeholder: e.g. Python 3.13 on bananaOS
    validations:
      required: false

  - type: textarea
    id: additional
    attributes:
      label: Additional Context
      description: Add any additional context, screenshots, or information that may be helpful.
      placeholder: e.g. I love qhormeh sabzi.
    validations:
      required: false

  - type: checkboxes
    id: checklist
    attributes:
      label: Checklist
      options:
        - label: I agree to follow this project's [Code of Conduct](https://github.com/notMehrzad/Amelie-discord-bot/blob/main/CODE_OF_CONDUCT.md).
          required: true
        - label: I have searched the existing issues and confirmed this is not a duplicate.
          required: true
        - label: I am willing to help fix this bug.
          required: false
