name: Feature Request
description: Suggest a new feature or enhancement.
title: "[Feature]: "
labels: ["enhancement", "triage"]
assignees: []

body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to suggest a new feature! Please fill out the sections below as clearly as possible.

  - type: textarea
    id: summary
    attributes:
      label: Feature Summary
      description: A clear and concise description of the feature you'd like to see.
      placeholder: What is in your mind?
    validations:
      required: true

  - type: textarea
    id: problem
    attributes:
      label: Motivation
      description: What problem does this feature solve? What's the use case?
      placeholder: How is it helpful?
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed Solution
      description: Describe how you'd like this feature to work.
      placeholder: What is the expected behavior?
    validations:
      required: true

  - type: dropdown
    id: feature-type
    attributes:
      label: Feature Type
      description: What kind of feature is this?
      options:
        - New command
        - Improvement to existing command
        - Internal bot behavior
        - Documentation
        - Other
    validations:
      required: true

  - type: textarea
    id: additional
    attributes:
      label: Additional Context
      description: Add any screenshots, mockups, links, or other context here.
    validations:
      required: false

  - type: checkboxes
    id: checklist
    attributes:
      label: Checklist
      options:
        - label: I agree to follow this project's [Code of Conduct](https://github.com/notMehrzad/Amelie-discord-bot/blob/main/CODE_OF_CONDUCT.md)
          required: true
        - label: I have searched existing issues and this is not a duplicate.
          required: true
        - label: I am willing to help implement this feature.
          required: false
